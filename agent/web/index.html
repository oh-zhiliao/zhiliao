<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhiliao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <!-- Prevent flash of wrong theme -->
  <script>
    (function(){var t=localStorage.getItem("zhiliao_theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark")})();
  </script>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen" hidden>
    <div class="login-box">
      <h1 data-i18n="app.title">Zhiliao</h1>
      <p class="subtitle" data-i18n="app.subtitle">Zhiliao WebChat</p>
      <form id="login-form">
        <input type="password" id="password-input" data-i18n="login.password" placeholder="Password" autocomplete="current-password">
        <button type="submit" data-i18n="login.submit">Sign In</button>
        <p id="login-error" class="error" hidden></p>
      </form>
      <div id="feishu-auth-section" hidden>
        <div class="login-divider"><span data-i18n="login.or">or</span></div>
        <button id="feishu-login-btn" type="button" class="feishu-login-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm4 0h-2v-6h2v6zm-2-8c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
          <span data-i18n="login.feishu">Sign in with Feishu</span>
        </button>
      </div>
      <button id="login-lang-toggle" class="login-lang-btn" title="Switch language">EN</button>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen" hidden>
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="sidebar-close" class="sidebar-close-btn" title="Close sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="4" x2="4" y2="12"/><line x1="4" y1="4" x2="12" y2="12"/></svg>
        </button>
        <button id="new-chat-btn" class="btn-primary" data-i18n="sidebar.newChat">New Chat</button>
      </div>
      <div id="session-list"></div>
      <div class="sidebar-footer">
        <button id="purge-btn" class="btn-danger" data-i18n="sidebar.purge">Purge All</button>
      </div>
    </aside>

    <button id="sidebar-toggle" class="hamburger">&#9776;</button>

    <main id="chat-main">
      <header id="chat-header">
        <span id="chat-title">Zhiliao</span>
        <div class="header-actions">
          <span id="connection-status" class="status-dot disconnected" title="Disconnected"></span>
          <div class="settings-wrapper">
            <button id="settings-toggle" class="header-btn" title="Settings">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.2"/><path d="M13.1 10a1.2 1.2 0 0 0 .24 1.32l.04.04a1.45 1.45 0 1 1-2.06 2.06l-.04-.04a1.2 1.2 0 0 0-1.32-.24 1.2 1.2 0 0 0-.73 1.1v.11a1.45 1.45 0 0 1-2.9 0v-.06a1.2 1.2 0 0 0-.78-1.1 1.2 1.2 0 0 0-1.32.24l-.04.04a1.45 1.45 0 1 1-2.06-2.06l.04-.04a1.2 1.2 0 0 0 .24-1.32 1.2 1.2 0 0 0-1.1-.73h-.11a1.45 1.45 0 0 1 0-2.9h.06a1.2 1.2 0 0 0 1.1-.78 1.2 1.2 0 0 0-.24-1.32l-.04-.04a1.45 1.45 0 1 1 2.06-2.06l.04.04a1.2 1.2 0 0 0 1.32.24h.06a1.2 1.2 0 0 0 .73-1.1v-.11a1.45 1.45 0 0 1 2.9 0v.06a1.2 1.2 0 0 0 .73 1.1 1.2 1.2 0 0 0 1.32-.24l.04-.04a1.45 1.45 0 1 1 2.06 2.06l-.04.04a1.2 1.2 0 0 0-.24 1.32v.06a1.2 1.2 0 0 0 1.1.73h.11a1.45 1.45 0 0 1 0 2.9h-.06a1.2 1.2 0 0 0-1.1.73z"/></svg>
            </button>
            <div id="settings-dropdown" class="settings-dropdown">
              <button id="lang-toggle" class="settings-item" title="Switch language">
                <svg class="icon-lang" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><line x1="2" y1="8" x2="14" y2="8"/><path d="M8 2a9.5 9.5 0 0 1 2.5 6A9.5 9.5 0 0 1 8 14a9.5 9.5 0 0 1-2.5-6A9.5 9.5 0 0 1 8 2z"/></svg>
                <span id="lang-toggle-text">EN</span>
              </button>
              <button id="theme-toggle" class="settings-item" title="Toggle theme">
                <svg class="icon-sun" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1.5" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="14.5"/><line x1="1.5" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="14.5" y2="8"/><line x1="3.4" y1="3.4" x2="4.5" y2="4.5"/><line x1="11.5" y1="11.5" x2="12.6" y2="12.6"/><line x1="3.4" y1="12.6" x2="4.5" y2="11.5"/><line x1="11.5" y1="4.5" x2="12.6" y2="3.4"/></svg>
                <svg class="icon-moon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M13.6 9.8A5.5 5.5 0 0 1 6.2 2.4a5.5 5.5 0 1 0 7.4 7.4z"/></svg>
                <span id="theme-toggle-text">Light</span>
              </button>
              <div class="settings-divider"></div>
              <button id="logout-btn" class="settings-item settings-item-danger" data-i18n="sidebar.logout">Logout</button>
            </div>
          </div>
          <button id="mobile-new-chat" class="header-btn mobile-only" title="New Chat">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="7.5" y1="2" x2="7.5" y2="13"/><line x1="2" y1="7.5" x2="13" y2="7.5"/></svg>
          </button>
        </div>
      </header>
      <div id="messages"></div>
      <div id="input-area">
        <div class="input-container">
          <textarea id="message-input" data-i18n="chat.placeholder" placeholder="Ask about your codebase&#8230;" rows="1"></textarea>
          <button id="stop-btn" title="Stop" hidden>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="2" y="2" width="10" height="10" rx="1.5"/></svg>
          </button>
          <button id="send-btn" title="Send">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14V4M9 4L5 8M9 4L13 8"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
