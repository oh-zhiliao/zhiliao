<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知了</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-box">
      <h1>知了</h1>
      <p class="subtitle">Zhiliao WebChat</p>
      <form id="login-form">
        <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
        <button type="submit">Login</button>
        <p id="login-error" class="error" hidden></p>
      </form>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen" class="screen" hidden>
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="new-chat-btn" class="btn-primary">+ New Chat</button>
      </div>
      <div id="session-list"></div>
      <div class="sidebar-footer">
        <button id="purge-btn" class="btn-danger">Purge All</button>
        <button id="logout-btn" class="btn-secondary">Logout</button>
      </div>
    </aside>

    <button id="sidebar-toggle" class="hamburger">&#9776;</button>

    <main id="chat-main">
      <header id="chat-header">
        <span id="chat-title">New Chat</span>
        <span id="connection-status" class="connection-dot disconnected" title="Disconnected"></span>
      </header>
      <div id="messages"></div>
      <div id="input-area">
        <div class="input-container">
          <textarea id="message-input" placeholder="Ask about your codebase..." rows="1"></textarea>
          <button id="send-btn" title="Send">&#8593;</button>
          <button id="stop-btn" title="Stop" hidden>&#9632;</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/store.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
