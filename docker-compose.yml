services:
  agent:
    build:
      context: ./agent
      network: host
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-false}
        BASE_IMAGE: ${USE_CN_MIRROR:+m.daocloud.io/docker.io/library/node:20-slim}
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ../git-repos:/app/plugins/git-repos
    environment:
      - MEMO_URL=http://127.0.0.1:8090
      - GIT_SSH_COMMAND=ssh -i /app/data/deploy_key -o UserKnownHostsFile=/app/data/ssh/known_hosts -o StrictHostKeyChecking=yes
    depends_on:
      rag:
        condition: service_healthy

  rag:
    build:
      context: ./memo
      network: host
      args:
        USE_CN_MIRROR: ${USE_CN_MIRROR:-false}
        BASE_IMAGE: ${USE_CN_MIRROR:+m.daocloud.io/docker.io/library/python:3.12-slim}
    network_mode: host
    volumes:
      - ./data/memo:/app/data
      - ./data/repos:/app/repos:ro
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
