# Zhiliao Configuration
# This file is gitignored. Put secrets directly here — no env var substitution needed.

project:
  name: "my-project"
  timezone: "Asia/Shanghai"              # IANA timezone for agent responses

feishu:
  app_id: "cli_xxx"
  app_secret: "your-feishu-app-secret"   # from open.feishu.cn → App Credentials
  event_mode: "websocket"

llm:
  agent:
    provider: "anthropic"                   # "anthropic" or "openai_compatible"
    base_url: "https://api.anthropic.com"   # required for openai_compatible
    model: "claude-sonnet-4-20250514"       # must support tool-use / function-calling
    api_key: "your-agent-api-key"
  memo:
    provider: "openai_compatible"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-chat"
    api_key: "your-memo-api-key"
  embedding:
    provider: "openai_compatible"
    base_url: "http://127.0.0.1:11434/v1"  # local Ollama
    model: "qwen3-embedding:0.6b"

# Memo knowledge tools (builtin, disabled by setting memo.enabled: false)
memo:
  enabled: true
  url: "http://127.0.0.1:8090"              # memo service URL

# WebChat — browser-based chat UI (optional)
# webchat:
#   enabled: true
#   port: 8080
#   password: "changeme"    # bcrypt-hashed on first startup
#   jwt_secret: "auto"      # auto-generated if "auto"
