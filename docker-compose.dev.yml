# Dev override: use build image + mount source, tsx runs TS directly.
# Build image only needs rebuilding when package.json changes.
#
#   bash deploy.sh           # builds build image if needed, restarts agent
#   bash deploy.sh --full    # full release image build (production/k8s)
#
services:
  agent:
    build: !reset null
    image: zhiliao-build
    volumes:
      - ./agent/src:/app/src:ro
      - ./agent/prompt:/app/prompt:ro
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./plugins:/app/plugins
